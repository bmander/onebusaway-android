<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Normal-Path Wavefront Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; display: flex; height: 100vh; }
  #sidebar { width: 280px; padding: 16px; background: #16213e; display: flex; flex-direction: column; gap: 12px; }
  #sidebar h2 { font-size: 16px; color: #e94560; }
  #sidebar label { font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
  #sidebar input[type=range] { width: 140px; }
  #sidebar button { padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-secondary { background: #0f3460; color: #ccc; }
  #info { font-size: 11px; color: #888; margin-top: auto; }
  canvas { flex: 1; display: block; cursor: crosshair; }
  .group { border-top: 1px solid #333; padding-top: 8px; }
</style>
</head>
<body>
<div id="sidebar">
  <h2>Normal-Path Wavefront</h2>
  <p style="font-size:12px;color:#aaa">Click to add polyline vertices. Offset edges stay parallel to originals; wavefront prevents tangles at sharp turns.</p>
  <div class="group">
    <label>Offset: <span id="offsetVal">30</span>px
      <input type="range" id="offsetSlider" min="0" max="200" value="30">
    </label>
    <label>Search radius: <span id="radiusVal">200</span>px
      <input type="range" id="radiusSlider" min="50" max="500" value="200">
    </label>
  </div>
  <div class="group">
    <label><input type="checkbox" id="showMiters"> Miter vectors</label>
    <label><input type="checkbox" id="showCollisions" checked> Collision events</label>
    <label><input type="checkbox" id="showPaths" checked> Normal paths</label>
    <label><input type="checkbox" id="showRibbon" checked> Ribbon (wavefront)</label>
    <label><input type="checkbox" id="showNaive"> Ribbon (naive miter)</label>
  </div>
  <div class="group">
    <button class="btn-primary" id="btnClear">Clear</button>
    <button class="btn-secondary" id="btnPresetKink">Preset: Sharp kink</button>
    <button class="btn-secondary" id="btnPresetU">Preset: U-turn</button>
    <button class="btn-secondary" id="btnPresetStraight">Preset: Straight</button>
    <button class="btn-secondary" id="btnPresetZigzag">Preset: Zigzag</button>
  </div>
  <div id="info">
    <div id="stats"></div>
  </div>
</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let vertices = [];
let edgeNormals = [];   // unit normal per edge (N-1 entries)
let miters = [];         // miter vector per vertex (non-unit; keeps offset edges parallel)
let normalPathsPos = [];
let normalPathsNeg = [];
let collisionEvents = [];

// Camera
let camX = 0, camY = 0, camZoom = 1;
let isPanning = false, panStartX = 0, panStartY = 0, panStartCamX = 0, panStartCamY = 0;

function screenToWorld(sx, sy) {
  return { x: (sx - camX) / camZoom, y: (sy - camY) / camZoom };
}
function applyCamera() {
  ctx.setTransform(devicePixelRatio * camZoom, 0, 0, devicePixelRatio * camZoom,
                   devicePixelRatio * camX, devicePixelRatio * camY);
}
function resize() {
  canvas.width = canvas.clientWidth * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
  draw();
}
window.addEventListener('resize', resize);

// --- Geometry ---
function sub(a, b) { return {x: a.x - b.x, y: a.y - b.y}; }
function add(a, b) { return {x: a.x + b.x, y: a.y + b.y}; }
function scale(v, s) { return {x: v.x * s, y: v.y * s}; }
function len(v) { return Math.hypot(v.x, v.y); }
function unit(v) { const l = len(v); return l < 1e-12 ? {x:0,y:0} : {x: v.x/l, y: v.y/l}; }
function cross(a, b) { return a.x * b.y - a.y * b.x; }
function dot(a, b) { return a.x * b.x + a.y * b.y; }
function perp(v) { return {x: -v.y, y: v.x}; }

// --- Edge normals & miter vectors ---

// Unit normal for each edge (perpendicular, left side)
function computeEdgeNormals(verts) {
  const out = [];
  for (let i = 0; i < verts.length - 1; i++) {
    out.push(unit(perp(sub(verts[i + 1], verts[i]))));
  }
  return out;
}

// Miter vector from two adjacent edge normals.
// Satisfies dot(m, nL) = dot(m, nR) = 1, so offsetting a vertex
// by t*m pushes both adjacent edges out by exactly t.
function miterVec(nL, nR) {
  const d = 1 + dot(nL, nR);
  if (d < 1e-9) return scale(perp(nL), 100); // near-180° fold — degenerate
  return scale(add(nL, nR), 1 / d);
}

function computeMiters(verts, eNormals) {
  const N = verts.length;
  const out = [];
  for (let i = 0; i < N; i++) {
    if (i === 0)          out.push({ ...eNormals[0] });
    else if (i === N - 1) out.push({ ...eNormals[N - 2] });
    else                  out.push(miterVec(eNormals[i - 1], eNormals[i]));
  }
  return out;
}

// --- Wavefront cascade (straight skeleton) ---

function computeCollisionT(rayA, rayB) {
  const denom = cross(rayA.dir, rayB.dir);
  if (Math.abs(denom) < 1e-12) return Infinity;
  const pA = sub(rayA.origin, scale(rayA.dir, rayA.collapseT));
  const pB = sub(rayB.origin, scale(rayB.dir, rayB.collapseT));
  return cross(sub(pB, pA), rayB.dir) / denom;
}

function runWavefront(verts, eNormals, miterVecs, searchRadius, sign) {
  const N = verts.length;
  if (N < 2) return { paths: [], events: [] };

  const rays = verts.map((v, i) => ({
    origin: { ...v },
    dir: scale(miterVecs[i], sign),
    // Track which edge normals are on each side of this vertex
    leftEN:  i > 0     ? { ...eNormals[i - 1] } : { ...eNormals[0] },
    rightEN: i < N - 1 ? { ...eNormals[i] }     : { ...eNormals[N - 2] },
    collapseT: 0,
    left: i - 1,
    right: i + 1,
    alive: true
  }));

  const paths = Array.from({length: N}, () => []);
  const events = [];
  const pq = [];

  function enq(t, iL, iR) {
    if (t > 0 && t < searchRadius && isFinite(t)) {
      pq.push({ t, iL, iR });
      pq.sort((a, b) => a.t - b.t);
    }
  }

  for (let i = 0; i < N - 1; i++) {
    enq(computeCollisionT(rays[i], rays[i + 1]), i, i + 1);
  }

  while (pq.length > 0) {
    const { t, iL, iR } = pq.shift();
    if (!rays[iL].alive || !rays[iR].alive) continue;
    if (rays[iL].right !== iR) continue;

    const pt = add(rays[iL].origin, scale(rays[iL].dir, t - rays[iL].collapseT));
    paths[iL].push({ t, pt: { ...pt } });
    paths[iR].push({ t, pt: { ...pt } });
    events.push({ t, pt: { ...pt }, iL, iR });

    // Merge: kill iR, update iL
    rays[iR].alive = false;
    rays[iR].mergedInto = iL;
    rays[iL].origin = { ...pt };
    rays[iL].collapseT = t;

    // iL inherits iR's right edge normal (the edge between them collapsed)
    rays[iL].rightEN = { ...rays[iR].rightEN };

    // Re-link
    const newRight = rays[iR].right;
    rays[iL].right = newRight;
    if (newRight < N) rays[newRight].left = iL;

    // Recompute miter from the two edges now adjacent to iL
    let nL = rays[iL].leftEN;
    let nR = rays[iL].rightEN;
    // Endpoint check: if iL is now an endpoint, miter = sole adjacent edge normal
    if (rays[iL].left < 0) nL = nR;
    if (newRight >= N)      nR = nL;
    rays[iL].leftEN = { ...nL };
    rays[iL].rightEN = { ...nR };
    rays[iL].dir = scale(miterVec(nL, nR), sign);

    // Enqueue new collisions with updated neighbors
    if (newRight < N) {
      const tNew = computeCollisionT(rays[iL], rays[newRight]);
      if (tNew > t) enq(tNew, iL, newRight);
    }
    const newLeft = rays[iL].left;
    if (newLeft >= 0) {
      const tNew = computeCollisionT(rays[newLeft], rays[iL]);
      if (tNew > t) enq(tNew, newLeft, iL);
    }
  }

  // Post-process: extend each killed ray's path along its merge chain
  // so that evalPath can follow through skeleton nodes to the survivor.
  for (let i = 0; i < N; i++) {
    let target = i;
    while (rays[target].mergedInto !== undefined) {
      target = rays[target].mergedInto;
      const lastT = paths[i].length > 0 ? paths[i][paths[i].length - 1].t : 0;
      for (const bend of paths[target]) {
        if (bend.t > lastT + 1e-12) {
          paths[i].push({ t: bend.t, pt: { ...bend.pt } });
        }
      }
    }
    // target is the ultimate surviving ray
    paths[i].ray = rays[target];
    paths[i].maxSafeT = searchRadius;
  }
  return { paths, events };
}

// Evaluate position along a normal path at offset t.
// Uses linear interpolation between waypoints (correct for non-unit miter vectors).
function evalPath(pathData, vertexPos, offset) {
  if (offset <= 0) return { ...vertexPos };

  let pos = { ...vertexPos };
  let currentT = 0;

  for (const bend of pathData) {
    if (bend.t >= offset) {
      const frac = (offset - currentT) / (bend.t - currentT);
      return add(pos, scale(sub(bend.pt, pos), frac));
    }
    pos = { ...bend.pt };
    currentT = bend.t;
  }

  // Past all bends — continue along surviving ray's direction
  if (pathData.ray) {
    return add(pos, scale(pathData.ray.dir, offset - currentT));
  }
  return { ...pos };
}

// --- Recompute ---
function recompute() {
  const searchRadius = +document.getElementById('radiusSlider').value;

  edgeNormals = computeEdgeNormals(vertices);
  miters = computeMiters(vertices, edgeNormals);

  if (vertices.length < 2) {
    normalPathsPos = []; normalPathsNeg = []; collisionEvents = [];
    return;
  }

  const resPos = runWavefront(vertices, edgeNormals, miters, searchRadius, +1);
  const resNeg = runWavefront(vertices, edgeNormals, miters, searchRadius, -1);
  normalPathsPos = resPos.paths;
  normalPathsNeg = resNeg.paths;
  collisionEvents = [...resPos.events, ...resNeg.events];

  document.getElementById('stats').textContent =
    `Vertices: ${vertices.length} | Edges: ${edgeNormals.length} | Collisions: ${collisionEvents.length}`;
}

// --- Drawing ---
function draw() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.clearRect(0, 0, w, h);
  applyCamera();

  const offset = +document.getElementById('offsetSlider').value;
  const iz = 1 / camZoom;
  const showMiters = document.getElementById('showMiters').checked;
  const showCollisions = document.getElementById('showCollisions').checked;
  const showPaths = document.getElementById('showPaths').checked;
  const showRibbon = document.getElementById('showRibbon').checked;
  const showNaive = document.getElementById('showNaive').checked;
  const N = vertices.length;

  // Polyline
  if (N >= 2) {
    ctx.strokeStyle = '#4af'; ctx.lineWidth = 2 * iz;
    ctx.beginPath();
    ctx.moveTo(vertices[0].x, vertices[0].y);
    for (let i = 1; i < N; i++) ctx.lineTo(vertices[i].x, vertices[i].y);
    ctx.stroke();
  }

  if (N < 2) {
    if (N === 1) {
      ctx.fillStyle = '#fff'; ctx.beginPath();
      ctx.arc(vertices[0].x, vertices[0].y, 5 * iz, 0, Math.PI * 2); ctx.fill();
    }
    return;
  }

  // Naive ribbon (miter joins, no wavefront fix — tangles at sharp turns)
  if (showNaive && offset > 0) {
    ctx.strokeStyle = 'rgba(255,100,100,0.4)';
    ctx.fillStyle = 'rgba(255,100,100,0.08)';
    ctx.lineWidth = 1 * iz;
    ctx.beginPath();
    for (let i = 0; i < N; i++) {
      const p = add(vertices[i], scale(miters[i], offset));
      i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    for (let i = N - 1; i >= 0; i--) {
      const p = add(vertices[i], scale(miters[i], -offset));
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  // Corrected ribbon (wavefront-fixed)
  if (showRibbon && offset > 0 && normalPathsPos.length === N) {
    ctx.fillStyle = 'rgba(100,200,255,0.15)';
    ctx.strokeStyle = 'rgba(100,200,255,0.6)';
    ctx.lineWidth = 1.5 * iz;
    ctx.beginPath();
    for (let i = 0; i < N; i++) {
      const p = evalPath(normalPathsPos[i], vertices[i], offset);
      i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    for (let i = N - 1; i >= 0; i--) {
      const p = evalPath(normalPathsNeg[i], vertices[i], offset);
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  // Miter vectors
  if (showMiters && offset > 0) {
    ctx.lineWidth = 0.5 * iz;
    for (let i = 0; i < N; i++) {
      for (const [s, color] of [[1, 'rgba(100,255,200,0.4)'], [-1, 'rgba(255,200,100,0.4)']]) {
        const end = add(vertices[i], scale(miters[i], s * offset));
        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(vertices[i].x, vertices[i].y);
        ctx.lineTo(end.x, end.y);
        ctx.stroke();
      }
    }
  }

  // Normal paths
  if (showPaths && normalPathsPos.length === N) {
    ctx.lineWidth = 1 * iz;
    const searchRadius = +document.getElementById('radiusSlider').value;
    for (let i = 0; i < N; i++) {
      for (const [paths, color] of [[normalPathsPos, 'rgba(0,255,150,0.3)'], [normalPathsNeg, 'rgba(255,150,0,0.3)']]) {
        const path = paths[i];
        if (path.length === 0) continue;
        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(vertices[i].x, vertices[i].y);
        for (const bend of path) ctx.lineTo(bend.pt.x, bend.pt.y);
        if (path.ray && path.ray.alive) {
          const last = path[path.length - 1];
          const ext = add(last.pt, scale(path.ray.dir, searchRadius - last.t));
          ctx.lineTo(ext.x, ext.y);
        }
        ctx.stroke();
      }
    }
  }

  // Collision dots
  if (showCollisions) {
    ctx.fillStyle = 'rgba(255,50,50,0.7)';
    for (const ev of collisionEvents) {
      ctx.beginPath();
      ctx.arc(ev.pt.x, ev.pt.y, 3 * iz, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Vertex handles
  for (const v of vertices) {
    ctx.fillStyle = '#fff'; ctx.beginPath();
    ctx.arc(v.x, v.y, 4 * iz, 0, Math.PI * 2); ctx.fill();
  }
}

// --- Interaction ---

canvas.addEventListener('mousedown', e => {
  if (e.button === 1) {
    e.preventDefault();
    isPanning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panStartCamX = camX; panStartCamY = camY;
    canvas.style.cursor = 'grabbing';
  }
});
window.addEventListener('mousemove', e => {
  if (isPanning) {
    camX = panStartCamX + (e.clientX - panStartX);
    camY = panStartCamY + (e.clientY - panStartY);
    draw();
  }
});
window.addEventListener('mouseup', e => {
  if (e.button === 1 && isPanning) { isPanning = false; canvas.style.cursor = 'crosshair'; }
});
canvas.addEventListener('auxclick', e => { if (e.button === 1) e.preventDefault(); });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const newZoom = Math.max(0.1, Math.min(20, camZoom * factor));
  camX = mx - (mx - camX) * (newZoom / camZoom);
  camY = my - (my - camY) * (newZoom / camZoom);
  camZoom = newZoom;
  draw();
}, { passive: false });

canvas.addEventListener('click', e => {
  if (e.button !== 0) return;
  const rect = canvas.getBoundingClientRect();
  vertices.push(screenToWorld(e.clientX - rect.left, e.clientY - rect.top));
  recompute(); draw();
});

document.getElementById('btnClear').addEventListener('click', () => {
  vertices = []; edgeNormals = []; miters = [];
  normalPathsPos = []; normalPathsNeg = []; collisionEvents = [];
  draw();
});

function loadPreset(pts) { vertices = pts; recompute(); draw(); }

document.getElementById('btnPresetKink').addEventListener('click', () =>
  loadPreset([{x:100,y:300},{x:300,y:300},{x:320,y:150},{x:500,y:300},{x:700,y:300}]));
document.getElementById('btnPresetU').addEventListener('click', () =>
  loadPreset([{x:100,y:200},{x:400,y:200},{x:450,y:300},{x:400,y:400},{x:100,y:400}]));
document.getElementById('btnPresetStraight').addEventListener('click', () =>
  loadPreset([{x:100,y:300},{x:300,y:300},{x:500,y:300},{x:700,y:300}]));
document.getElementById('btnPresetZigzag').addEventListener('click', () =>
  loadPreset([{x:100,y:400},{x:200,y:150},{x:350,y:400},{x:500,y:150},{x:650,y:400},{x:750,y:150}]));

for (const id of ['offsetSlider', 'radiusSlider']) {
  document.getElementById(id).addEventListener('input', e => {
    document.getElementById(id.replace('Slider', 'Val')).textContent = e.target.value;
    if (id === 'radiusSlider') recompute();
    draw();
  });
}
for (const id of ['showMiters','showCollisions','showPaths','showRibbon','showNaive']) {
  document.getElementById(id).addEventListener('change', draw);
}

resize();
loadPreset([{x:100,y:300},{x:300,y:300},{x:320,y:150},{x:500,y:300},{x:700,y:300}]);
</script>
</body>
</html>
